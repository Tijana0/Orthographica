<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orthographica · An Atlas of Human Writing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="topbar">
    <div class="brand-row">
      <div class="brand">
        <h1>Orthographica</h1>
        <p class="tagline">An interactive atlas of the world&rsquo;s writing systems &mdash; 5,300 years, six mechanisms, one species</p>
      </div>
      <nav class="tabs" id="tabs" aria-label="Views"></nav>
    </div>

    <div class="controls">
      <div class="seg" id="status-seg" role="group" aria-label="Status filter"></div>
      <div class="chips" id="type-chips" aria-label="Type filter"></div>
      <div class="chips" id="dir-chips" aria-label="Directionality filter"></div>
    </div>

    <div class="meta-row">
      <div class="statsbar" id="statsbar"></div>
      <div class="search-wrap">
        <input id="search" type="search" placeholder="Search scripts or languages&hellip;" autocomplete="off" spellcheck="false">
      </div>
    </div>
  </header>

  <main id="stage" aria-live="polite"></main>

  <aside id="panel" aria-label="Script detail">
    <button id="panel-close" title="Close (Esc)">&times;</button>
    <div id="panel-body"></div>
  </aside>

  <footer id="colophon">
    <span>Orthographica &mdash; 202 scripts catalogued after ISO&nbsp;15924.</span>
    <span>Native samples require system fonts; unencoded scripts are marked.</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
